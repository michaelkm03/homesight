<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -6 96 74" fill="none">
  <style>
    @keyframes hs-glow {
      0%, 100% { filter: drop-shadow(0 0 3.6px rgba(110,231,183,0.20)); }
      50%       { filter: drop-shadow(0 0 10px rgba(110,231,183,0.45))
                          drop-shadow(0 0 20px rgba(110,231,183,0.18)); }
    }
    .hs { animation: hs-glow 1.8s ease-in-out infinite; }
  </style>
  <g class="hs">
    <polyline points="6,66 25,36 36,49 59,18 70,27 80,12"
      stroke="#1a5c3a" stroke-width="9.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="88,0 86,16 74,8" fill="#1a5c3a"/>
    <polyline points="3,63 22,33 33,46 56,15 67,24 77,9"
      stroke="#6ee7b7" stroke-width="9.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="85,-3 83,13 71,5" fill="#6ee7b7"/>
  </g>
</svg>

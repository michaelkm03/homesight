<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="10" ry="28" fill="#1a1a1a" transform="rotate(-10 100 130)"/>

  <!-- Head (triangular, tilted forward — strike pose) -->
  <polygon points="100,62 88,82 112,82" fill="#1a1a1a" transform="rotate(15 100 72)"/>

  <!-- Eye -->
  <circle cx="106" cy="70" r="3" fill="#4ade80"/>

  <!-- Left forearm (raised, folded — iconic mantis strike) -->
  <line x1="94" y1="108" x2="70" y2="78" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <line x1="70" y1="78" x2="82" y2="62" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>

  <!-- Right forearm (mirrored) -->
  <line x1="106" y1="108" x2="130" y2="78" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
  <line x1="130" y1="78" x2="118" y2="62" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>

  <!-- Mid legs (thin, splayed) -->
  <line x1="92" y1="120" x2="68" y2="116" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="116" x2="60" y2="128" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

  <line x1="108" y1="120" x2="132" y2="116" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="132" y1="116" x2="140" y2="128" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

  <!-- Hind legs -->
  <line x1="94" y1="140" x2="72" y2="148" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="148" x2="66" y2="162" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

  <line x1="106" y1="140" x2="128" y2="148" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="128" y1="148" x2="134" y2="162" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

  <!-- Abdomen tip -->
  <ellipse cx="99" cy="158" rx="5" ry="8" fill="#1a1a1a" transform="rotate(-8 99 158)"/>

  <!-- Green accent dot — target/crosshair feel -->
  <circle cx="100" cy="192" r="4" fill="#4ade80" opacity="0.7"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Beacon — Logo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 72px;
      padding: 80px 40px;
    }
    h1 { color: rgba(255,255,255,0.18); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; }
    .sizes { display: flex; flex-direction: column; align-items: center; gap: 40px; }
    .size-row { display: flex; align-items: center; gap: 20px; }
    .size-hint { color: rgba(255,255,255,0.12); font-size: 0.58rem; letter-spacing: 0.08em; width: 36px; text-align: right; }
    .wordmark { font-size: 0.72rem; font-weight: 900; letter-spacing: 0.22em; text-transform: uppercase; color: white; }
    .wordmark span { color: #6ee7b7; }
    .divider { width: 400px; border: none; border-top: 1px solid rgba(255,255,255,0.06); }
    .preview-row { display: flex; align-items: center; gap: 48px; }
    .preview-label { color: rgba(255,255,255,0.14); font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; margin-top: 8px; }
    .light-bg { background: #f4f5f7; border-radius: 8px; display: flex; align-items: center; padding: 10px 18px; gap: 10px; }
  </style>
</head>
<body>

<h1>Beacon — Uptick Logo</h1>

<div class="sizes">

  <div class="size-row">
    <span class="size-hint">128</span>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 36" width="128" height="104">
      <!-- Area fill -->
      <path d="M 4 32 L 4 27 L 16 21 L 24 11 L 38 5 L 38 32 Z" fill="#6ee7b7" opacity="0.07"/>
      <!-- Trend line: steady rise → sharp uptick at midpoint → steady rise -->
      <polyline points="4,27 16,21 24,11 38,5"
                fill="none" stroke="#6ee7b7" stroke-width="2.6"
                stroke-linecap="round" stroke-linejoin="round"/>
      <!-- End dot -->
      <circle cx="38" cy="5" r="3.2" fill="#6ee7b7"/>
      <!-- Baseline -->
      <line x1="4" y1="32" x2="40" y2="32"
            stroke="#6ee7b7" stroke-width="1.4" stroke-linecap="round" opacity="0.2"/>
    </svg>
  </div>

  <div class="size-row">
    <span class="size-hint">48</span>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 36" width="48" height="39">
      <path d="M 4 32 L 4 27 L 16 21 L 24 11 L 38 5 L 38 32 Z" fill="#6ee7b7" opacity="0.07"/>
      <polyline points="4,27 16,21 24,11 38,5"
                fill="none" stroke="#6ee7b7" stroke-width="2.6"
                stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="38" cy="5" r="3.2" fill="#6ee7b7"/>
      <line x1="4" y1="32" x2="40" y2="32"
            stroke="#6ee7b7" stroke-width="1.4" stroke-linecap="round" opacity="0.2"/>
    </svg>
  </div>

  <div class="size-row">
    <span class="size-hint">20</span>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 36" width="20" height="16">
      <path d="M 4 32 L 4 27 L 16 21 L 24 11 L 38 5 L 38 32 Z" fill="#6ee7b7" opacity="0.07"/>
      <polyline points="4,27 16,21 24,11 38,5"
                fill="none" stroke="#6ee7b7" stroke-width="2.6"
                stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="38" cy="5" r="3.2" fill="#6ee7b7"/>
      <line x1="4" y1="32" x2="40" y2="32"
            stroke="#6ee7b7" stroke-width="1.4" stroke-linecap="round" opacity="0.2"/>
    </svg>
  </div>

</div>

<hr class="divider"/>

<div class="preview-row">

  <div>
    <div style="display:flex;align-items:center;gap:12px;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 36" width="32" height="26">
        <path d="M 4 32 L 4 27 L 16 21 L 24 11 L 38 5 L 38 32 Z" fill="#6ee7b7" opacity="0.07"/>
        <polyline points="4,27 16,21 24,11 38,5"
                  fill="none" stroke="#6ee7b7" stroke-width="2.6"
                  stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="38" cy="5" r="3.2" fill="#6ee7b7"/>
        <line x1="4" y1="32" x2="40" y2="32"
              stroke="#6ee7b7" stroke-width="1.4" stroke-linecap="round" opacity="0.2"/>
      </svg>
      <div class="wordmark">Bea<span>con</span></div>
    </div>
    <div class="preview-label">dark bg</div>
  </div>

  <div>
    <div class="light-bg">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 36" width="32" height="26">
        <path d="M 4 32 L 4 27 L 16 21 L 24 11 L 38 5 L 38 32 Z" fill="#059669" opacity="0.09"/>
        <polyline points="4,27 16,21 24,11 38,5"
                  fill="none" stroke="#059669" stroke-width="2.6"
                  stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="38" cy="5" r="3.2" fill="#059669"/>
        <line x1="4" y1="32" x2="40" y2="32"
              stroke="#059669" stroke-width="1.4" stroke-linecap="round" opacity="0.25"/>
      </svg>
      <div style="font-size:0.72rem;font-weight:900;letter-spacing:0.22em;text-transform:uppercase;color:#0d1117;">Bea<span style="color:#059669">con</span></div>
    </div>
    <div class="preview-label">light bg</div>
  </div>

</div>

</body>
</html>
